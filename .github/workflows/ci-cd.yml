name: CI/CD Pipeline

on:
  push:
    branches: ['*']
  pull_request:
    branches: ['*']

jobs:
  # 代码质量检查
  lint:
    name: Code Linting
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.14.1'
          cache: 'npm'
      
      - name: Cache node modules
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run ESLint
        run: npx eslint src/ --ext .ts,.tsx || echo "ESLint check completed"
      
      - name: Check TypeScript
        run: npx tsc --noEmit --skipLibCheck

  # E2E 测试
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.14.1'
          cache: 'npm'
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Cache pip packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      
      - name: Install Node dependencies
        run: npm ci
      
      - name: Install Python dependencies
        run: pip install -r requirements.txt
      
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      
      - name: Build H5 for testing
        run: npm run build:h5
      
      - name: Install static file server
        run: npm install -g serve
      
      - name: Start H5 server
        run: serve -s dist -l 10086 > /tmp/dev-server.log 2>&1 &
        env:
          NODE_ENV: test
      
      - name: Wait for dev server to be ready
        run: |
          echo "Waiting for dev server to start..."
          for i in {1..30}; do
            if curl -s http://localhost:10086 > /dev/null 2>&1; then
              echo "Dev server is ready!"
              exit 0
            fi
            echo "Waiting... ($i/30)"
            sleep 2
          done
          echo "Dev server failed to start. Logs:"
          cat /tmp/dev-server.log
          exit 1
      
      - name: Run E2E tests
        run: |
          cd e2e
          python3 -m pytest tests/ -v --html=reports/report.html --self-contained-html
        
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-reports
          path: e2e/reports/
          retention-days: 30
      
      - name: Upload screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-screenshots
          path: e2e/screenshots/
          retention-days: 30

  # 构建并部署 GitHub Pages（仅主分支）
  deploy-pages:
    name: Deploy GitHub Pages
    runs-on: ubuntu-latest
    needs: [lint, e2e-tests]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.14.1'
          cache: 'npm'
      
      - name: Cache node modules
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build H5 version
        run: NODE_ENV=production npm run build:h5
      
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true
          commit_message: 'Deploy H5 build from ${{ github.sha }}'
